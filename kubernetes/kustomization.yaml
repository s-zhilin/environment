apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sv

resources:
  - namespace.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - redis/statefulset.yaml
  - redis/service.yaml
  - nats/configmap.yaml
  - nats/statefulset.yaml
  - nats/service.yaml
  - keycloak/deployment.yaml
  - keycloak/service.yaml
  - keycloak/ingress.yaml
  - prometheus/configmap.yaml
  - prometheus/statefulset.yaml
  - prometheus/service.yaml
  - otel-collector/configmap.yaml
  - otel-collector/deployment.yaml
  - otel-collector/service.yaml

# Аналог .env из compose: файлы не в гите, копируются из *.env.example.
# Хеш в имени секрета заставляет поды перезапуститься при смене пароля —
# без него обновлённый секрет доезжает только при следующем рестарте.
secretGenerator:
  - name: postgres
    envs:
      - secrets/postgres.env
  - name: keycloak
    envs:
      - secrets/keycloak.env
