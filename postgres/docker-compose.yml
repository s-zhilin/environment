version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # PG18 хранит данные в /var/lib/postgresql/18/docker — том монтируется
      # на уровень выше. Монтирование в /var/lib/postgresql/data (путь PG17
      # и старше) образ считает следом неудавшегося апгрейда и не стартует.
      - postgres_data:/var/lib/postgresql
    networks:
      - services
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  postgres_data:

networks:
  services:
    external: true
