services:
  youtrack:
    image: jetbrains/youtrack:latest
    container_name: youtrack
    restart: unless-stopped
    volumes:
      - yt-data:/opt/youtrack/data
      - yt-conf:/opt/youtrack/conf
      - yt-logs:/opt/youtrack/logs
      - yt-backups:/opt/youtrack/backups
    networks:
      - core

volumes:
  yt-data:
    name: you-track_yt-data
    external: true
  yt-conf:
    name: you-track_yt-conf
    external: true
  yt-logs:
    name: you-track_yt-logs
    external: true
  yt-backups:
    name: you-track_yt-backups
    external: true

networks:
  core:
    external: true