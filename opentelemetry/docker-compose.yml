version: "3.9"

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_VERSION:-0.156.0}
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    expose:
      - "4317"
      - "4318"
      - "13133"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - services
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

networks:
  services:
    external: true
